server.port=10000
logging.level.root=INFO
logging.level.by.hgrosh.mockserver=DEBUG
# Ensure logs are not buffered and output to console
spring.main.banner-mode=off

# L2 provider profiles. Used to distinguish prod vs sandbox calls from HG.
# Empty secret => signature check is bypassed (preserves current behavior).
# Non-empty secret => strict MD5 check; mismatch returns deny.
mock.prod.secret=${MOCK_PROD_SECRET:}
mock.prod.headerKey=${MOCK_PROD_HEADER_KEY:X-Signature}
mock.sandbox.secret=${MOCK_SANDBOX_SECRET:}
mock.sandbox.headerKey=${MOCK_SANDBOX_HEADER_KEY:X-Signature}
