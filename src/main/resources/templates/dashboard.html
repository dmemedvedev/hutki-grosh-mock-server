<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hutki Grosh Mock Dashboard</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0e14;
            --card-bg: #161b22;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --border-color: #30363d;
            --success: #238636;
            --error: #da3633;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }
        h1 { font-weight: 600; color: #fff; }
        .log-entry {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 15px;
            padding: 20px;
            transition: transform 0.2s;
        }
        .log-entry:hover { transform: translateY(-2px); border-color: var(--accent-color); }
        .meta { display: flex; gap: 20px; font-size: 0.9em; color: #8b949e; margin-bottom: 15px; }
        .tag { padding: 2px 8px; border-radius: 4px; font-weight: 600; font-size: 0.8em; text-transform: uppercase; }
        .tag-post { background: var(--success); color: #fff; }
        .tag-sig { background: #388bfd26; color: var(--accent-color); border: 1px solid #388bfd66; }
        .tag-error { background: #f8514926; color: var(--error); border: 1px solid #f8514966; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        pre { background: #010409; padding: 15px; border-radius: 6px; overflow-x: auto; font-size: 0.85em; max-height: 300px; border: 1px solid #30363d;}
        .label { font-weight: 600; margin-bottom: 5px; display: block; color: #8b949e; }
        .badge-valid { color: #3fb950; }
        .badge-invalid { color: #f85149; }
        .refresh-btn { background: var(--accent-color); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .refresh-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>Хуткi Грош™ Mock Dashboard</h1>
        <button class="refresh-btn" onclick="location.reload()">Обновить</button>
    </header>

    <div th:if="${logs.empty}">
        <p style="text-align: center; color: #8b949e; margin-top: 50px;">Ожидание транзакций...</p>
    </div>

    <div th:each="log : ${logs}" class="log-entry">
        <div class="meta">
            <span class="tag tag-post">POST</span>
            <span th:text="${#temporals.format(log.timestamp, 'HH:mm:ss dd.MM.yyyy')}"></span>
            <code th:text="${log.url}"></code>
            <span th:if="${log.signature != null}" class="tag tag-sig">Signature</span>
            <span th:if="${log.signature != null}" th:class="${log.signatureValid} ? 'badge-valid' : 'badge-invalid'">
                <span th:text="${log.signatureValid} ? '✓ Valid' : '✗ Invalid'"></span>
            </span>
        </div>
        <div class="grid">
            <div>
                <span class="label">Request ([(${log.request.type})])</span>
                <pre th:text="${log.request}"></pre>
            </div>
            <div>
                <span class="label">Response ([(${log.response.responseCode})])</span>
                <pre th:text="${log.response}"></pre>
            </div>
        </div>
    </div>
</div>
</body>
</html>
